services:
  postgres:
    image: postgres:16-alpine
    container_name: portvision-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: portvision
      POSTGRES_PASSWORD: portvision
      POSTGRES_DB: portvision
    ports:
      - "5432:5432"
    volumes:
      - portvision_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portvision -d portvision"]
      interval: 5s
      timeout: 5s
      retries: 10

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: portvision-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - portvision_mqttdata:/mosquitto/data
      - portvision_mqttlog:/mosquitto/log

volumes:
  portvision_pgdata:
  portvision_mqttdata:
  portvision_mqttlog:
